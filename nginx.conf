pid /tmp/nginx.pid;

daemon off;

http {
    include /etc/nginx/mime.types;
    server {
        listen 8080;
        server_name localhost;
        location / {
          root /usr/share/nginx/html/browser;
          index index.html;
          try_files $uri $uri/ /index.html;
        }
    }
}
events {
  worker_connections 1024;
}