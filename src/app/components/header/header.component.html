<mat-toolbar class="app-header">
  <button mat-icon-button (click)="toggleSidenav.emit()" aria-label="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="header-logo-badge">FHIR</span>
  <span class="header-title">Developer Portal</span>
  <span class="spacer"></span>
  <a routerLink="/settings" class="env-badge" [matTooltip]="serverConfigService.activeServer().url">
    <mat-icon class="env-badge-icon">dns</mat-icon>
    {{ serverConfigService.activeServer().name }}
  </a>
  <button
    mat-icon-button
    (click)="themeService.toggle()"
    [matTooltip]="themeService.isDark ? 'Switch to light mode' : 'Switch to dark mode'"
    aria-label="Toggle theme"
    class="theme-toggle">
    <mat-icon>{{ themeService.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>
