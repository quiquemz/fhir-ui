<div class="home-container">
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1 class="hero-title">FHIR</h1>
      <p class="hero-subtitle"> FHIR UI — Browse, search, and manage FHIR resources </p>
    </div>
  </section>

  <!-- Resource Cards Grid Grouped by Category -->
  @for (category of categories(); track category) {
    <section class="resources-section">
      <h2 class="section-title">{{ category }}</h2>
      <div class="resource-grid">
        @for (resource of groupedResources().get(category); track resource.resourceType) {
          <a [routerLink]="['/', resource.resourceType]" class="resource-card-link">
            <mat-card class="resource-card">
              <mat-card-content>
                <div class="card-icon">
                  <mat-icon>{{ resource.icon || 'description' }}</mat-icon>
                </div>
                <span class="card-label">{{ resource.resourceType }}</span>
                <mat-icon class="card-arrow">arrow_forward</mat-icon>
              </mat-card-content>
            </mat-card>
          </a>
        }
      </div>
    </section>
  }
</div>
